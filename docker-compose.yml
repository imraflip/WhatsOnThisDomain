services:
  wotd:
    build: .
    image: wotd
    volumes:
      - ./wotd:/app/wotd
      - ./tests:/app/tests
      - wotd-config:/root/.config/wotd
      - wotd-data:/root/.local/share/wotd
    stdin_open: true
    tty: true

  dev:
    build: .
    image: wotd
    entrypoint: []
    command: bash
    volumes:
      - ./wotd:/app/wotd
      - ./tests:/app/tests
      - wotd-config:/root/.config/wotd
      - wotd-data:/root/.local/share/wotd
    stdin_open: true
    tty: true

volumes:
  wotd-config:
  wotd-data:
